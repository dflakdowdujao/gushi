<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小学必备古诗词 · 1-6年级</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap');

:root {
  --paper: #f5f0e8;
  --paper-dark: #e8dfd0;
  --ink: #2c1810;
  --ink-light: #5a3a28;
  --ink-faint: #8b6914;
  --accent: #8b0000;
  --accent-light: #c41e3a;
  --gold: #b8860b;
  --gold-light: #daa520;
  --border: #c4a882;
  --shadow: rgba(44,24,16,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
  background: var(--paper);
  color: var(--ink);
  position: relative;
  overflow-x: hidden;
}

/* 水墨画背景装饰 */
body::before {
  content: '';
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 320px;
  pointer-events: none; z-index: 0;
  background:
    /* 远山 - 淡墨 */
    radial-gradient(ellipse 600px 120px at 15% 85%, rgba(44,24,16,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 100px at 40% 88%, rgba(44,24,16,0.04) 0%, transparent 65%),
    radial-gradient(ellipse 700px 140px at 70% 82%, rgba(44,24,16,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 400px 80px at 90% 90%, rgba(44,24,16,0.03) 0%, transparent 60%),
    /* 近山 - 稍浓 */
    radial-gradient(ellipse 350px 90px at 25% 92%, rgba(44,24,16,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 450px 100px at 60% 95%, rgba(44,24,16,0.06) 0%, transparent 55%),
    /* 水面 */
    linear-gradient(0deg, rgba(44,24,16,0.03) 0%, transparent 40%);
}

body::after {
  content: '';
  position: fixed; top: 0; right: 0;
  width: 300px; height: 400px;
  pointer-events: none; z-index: 0; opacity: 0.04;
  background:
    /* 右上角松树剪影 */
    radial-gradient(ellipse 60px 80px at 80% 20%, rgba(44,24,16,1) 0%, transparent 70%),
    radial-gradient(ellipse 40px 50px at 70% 35%, rgba(44,24,16,1) 0%, transparent 65%),
    radial-gradient(ellipse 30px 40px at 85% 40%, rgba(44,24,16,1) 0%, transparent 60%),
    radial-gradient(ellipse 4px 60px at 78% 50%, rgba(44,24,16,0.8) 0%, transparent 90%);
}

/* 页面内容层 */
.top-bar, .grade-nav, .main, .footer, .back-top { position: relative; z-index: 1; }

/* 顶部横幅 */
.top-bar {
  position: fixed; top:0; left:0; right:0; z-index:100;
  padding: 0;
  display: flex; flex-direction: column;
  background: var(--paper);
  backdrop-filter: blur(12px);
}
.top-banner {
  position: relative;
  background: linear-gradient(135deg, #2c1810 0%, #3d2a1c 30%, #4a3525 60%, #2c1810 100%);
  padding: 16px 32px 12px;
  overflow: hidden;
}
/* 水墨山水背景 - 用 SVG 内联 */
.top-banner::before {
  content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
  background:
    /* 远山 */
    radial-gradient(ellipse 300px 60px at 10% 70%, rgba(255,255,255,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 250px 50px at 30% 75%, rgba(255,255,255,0.04) 0%, transparent 65%),
    radial-gradient(ellipse 400px 80px at 55% 65%, rgba(255,255,255,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 200px 40px at 80% 72%, rgba(255,255,255,0.03) 0%, transparent 60%),
    /* 近山 */
    radial-gradient(ellipse 180px 50px at 20% 85%, rgba(255,255,255,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 300px 60px at 65% 88%, rgba(255,255,255,0.06) 0%, transparent 50%),
    /* 水面倒影 */
    linear-gradient(0deg, rgba(255,255,255,0.04) 0%, transparent 30%);
}
/* 右侧松枝剪影 */
.top-banner::after {
  content: ''; position: absolute; top:0; right:0;
  width: 200px; height: 100%; opacity: 0.08;
  background:
    radial-gradient(ellipse 40px 50px at 85% 25%, rgba(255,255,255,1) 0%, transparent 70%),
    radial-gradient(ellipse 30px 40px at 75% 40%, rgba(255,255,255,1) 0%, transparent 65%),
    radial-gradient(ellipse 25px 30px at 90% 45%, rgba(255,255,255,1) 0%, transparent 60%),
    radial-gradient(ellipse 3px 50px at 82% 55%, rgba(255,255,255,0.8) 0%, transparent 90%);
}
.top-banner h1 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 36px; color: #f5f0e8;
  letter-spacing: 8px; font-weight: 900;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  position: relative; z-index: 1;
}
.top-banner .subtitle {
  font-size: 14px; color: rgba(245,240,232,0.6);
  letter-spacing: 2px; margin-top: 4px;
  position: relative; z-index: 1;
}
.top-progress {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  padding: 8px 32px;
  background: #f5f0e8;
  border-bottom: 1px solid #c4a882;
}
.top-progress span.label { font-size: 13px; color: #5a3a28; }
.progress-wrap { display: flex; align-items: center; gap: 14px; }
.progress-bar {
  width: 360px; height: 14px; background: #ddd5c6;
  border-radius: 7px; overflow: hidden;
  border: 1px solid #b09a78;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #b8860b, #8b0000);
  border-radius: 7px; transition: width 0.5s ease;
  position: relative;
}
.progress-fill::after {
  content: ''; position: absolute; top: 2px; left: 4px; right: 4px; height: 4px;
  background: rgba(255,255,255,0.3); border-radius: 2px;
}
.progress-text { font-size: 14px; color: #2c1810; white-space: nowrap; font-weight: 700; }

/* 顶部年级导航 */
.grade-nav {
  position: fixed; top: 125px; left:0; right:0; z-index: 101;
  background: #f5f0e8;
  border-bottom: 1px solid #c4a882;
  padding: 6px 20px 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.grade-nav-row {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.grade-nav-item {
  padding: 4px 14px; font-size: 13px; color: var(--ink-light);
  background: transparent; border: 1px solid transparent;
  border-radius: 16px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
  text-decoration: none; display: inline-block;
}
.grade-nav-item:hover {
  color: var(--accent); border-color: var(--accent);
  background: rgba(139,0,0,0.05);
}
.grade-nav-item.active {
  color: #fff; background: var(--accent);
  border-color: var(--accent); font-weight: 600;
}

/* 主内容区 */
.main { margin: 0 auto; padding: 210px 40px 0; max-width: 900px; }

.grade-header {
  text-align: center; padding: 24px 0 6px; position: relative;
  cursor: pointer;
}
.grade-header h2 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 22px; color: var(--ink); letter-spacing: 4px;
  display: inline-flex; align-items: center; gap: 8px;
}
.grade-header h2::after {
  content: '▸'; font-size: 12px; color: var(--ink-faint);
  transition: transform 0.3s;
}
.grade-header.collapsed h2::after { transform: rotate(90deg); }
.grade-poems { overflow: hidden; }

/* 古诗卡片 - 简洁列表风 */
.poem-card {
  background: #fff;
  border: 1px solid rgba(196,168,130,0.3);
  border-radius: 6px;
  margin-bottom: 8px;
  transition: box-shadow 0.2s;
}
.poem-card:hover { box-shadow: 0 2px 8px rgba(44,24,16,0.06); }
.poem-card-inner { padding: 0; }

/* 标题行 - 紧凑可点击 */
.poem-title-area {
  padding: 12px 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s;
}
.poem-title-area:hover { background: rgba(139,0,0,0.03); }
.poem-title-left {
  display: flex; align-items: baseline; gap: 10px;
}
.poem-title-left h3 {
  font-size: 16px; color: var(--ink); margin: 0;
  letter-spacing: 1px;
}
.poem-title-left .poem-meta { font-size: 12px; color: var(--ink-faint); }
.poem-title-arrow {
  font-size: 10px; color: var(--border); transition: transform 0.3s;
  flex-shrink: 0;
}
.poem-card.open .poem-title-arrow { transform: rotate(90deg); }
.poem-card.open .poem-title-area { border-bottom: 1px solid rgba(196,168,130,0.2); }

/* 卡片内容 - 默认隐藏 */
.poem-body { display: none; }
.poem-card.open .poem-body { display: block; }

/* Tab 标签栏 */
.poem-tabs {
  display: flex; gap: 0; border-bottom: 1px solid rgba(196,168,130,0.3);
  padding: 0 16px;
  background: rgba(245,240,232,0.4);
}
.poem-tab {
  padding: 8px 14px; font-size: 13px; color: var(--ink-light);
  cursor: pointer; border: none; background: none;
  font-family: inherit; position: relative;
  transition: color 0.2s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.poem-tab:hover { color: var(--accent); }
.poem-tab.active {
  color: var(--accent); font-weight: 600;
  border-bottom-color: var(--accent);
}

/* Tab 内容区 */
.poem-tab-content {
  padding: 12px 20px;
}
.poem-tab-panel { display: none; }
.poem-tab-panel.active { display: block; }

/* 诗文面板 */
.poem-text {
  text-align: center; padding: 12px 0;
  font-size: 21px; line-height: 2;
  letter-spacing: 2px; color: var(--ink);
}
.poem-text p { margin-bottom: 6px; }

/* 译文面板 */
.translation-text {
  font-size: 15px; line-height: 2; color: var(--ink-light);
  padding: 12px 16px;
  background: rgba(44,24,16,0.02); border-radius: 4px;
  border-left: 3px solid rgba(44,24,16,0.1);
}
.translation-text p { margin-bottom: 8px; }

/* 赏析面板 */
.explanation { font-size: 14px; line-height: 1.9; color: var(--ink); }
.explanation .line-analysis {
  margin: 8px 0; padding: 8px 14px;
  background: rgba(255,255,255,0.5); border-radius: 4px;
  border-left: 2px solid var(--gold-light);
}
.explanation .line-analysis .original {
  font-weight: 700; color: var(--accent); margin-bottom: 3px; font-size: 13px;
}

.author-info {
  background: rgba(184,134,11,0.06);
  border-left: 3px solid var(--gold);
  padding: 12px 16px; border-radius: 0 4px 4px 0;
  font-size: 13px; line-height: 1.8; color: var(--ink-light);
  margin-top: 12px;
}

.background-info {
  font-size: 14px; line-height: 1.9; color: var(--ink-light);
  padding: 14px 18px; background: rgba(139,0,0,0.03); border-radius: 4px;
}

.extra-knowledge { font-size: 14px; line-height: 1.9; color: var(--ink-light); margin-top: 12px; }
.extra-knowledge ul { list-style: none; padding: 0; }
.extra-knowledge li { padding: 3px 0 3px 18px; position: relative; }
.extra-knowledge li::before {
  content: '◆'; position: absolute; left: 0;
  color: var(--gold); font-size: 10px; top: 7px;
}

/* 测试题 */
.quiz-area { }
.quiz-title {
  font-size: 15px; font-weight: 700; color: var(--accent);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.quiz-title::before { content: '📝'; }
.quiz-question {
  margin-bottom: 16px; padding: 14px 18px;
  background: rgba(255,255,255,0.5); border-radius: 6px;
  border: 1px solid rgba(196,168,130,0.3);
}
.quiz-question .q-text {
  font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 10px;
}
.quiz-question .q-type {
  display: inline-block; font-size: 11px;
  padding: 2px 8px; border-radius: 3px; margin-bottom: 8px;
}
.q-type.choice { background: rgba(184,134,11,0.15); color: var(--gold); }
.q-type.fill { background: rgba(139,0,0,0.1); color: var(--accent); }
.q-type.judge { background: rgba(44,24,16,0.1); color: var(--ink-light); }

.quiz-options { display: flex; flex-direction: column; gap: 6px; }
.quiz-option {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 4px;
  cursor: pointer; font-size: 14px;
  border: 1px solid transparent; transition: all 0.2s;
}
.quiz-option:hover { background: rgba(184,134,11,0.08); }
.quiz-option.selected { border-color: var(--gold); background: rgba(184,134,11,0.1); }
.quiz-option.correct { border-color: #2d7d2d; background: rgba(45,125,45,0.1); color: #2d7d2d; }
.quiz-option.wrong { border-color: var(--accent); background: rgba(139,0,0,0.08); color: var(--accent); text-decoration: line-through; }
.quiz-option .letter {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.quiz-option.selected .letter { background: var(--gold); color: #fff; border-color: var(--gold); }
.quiz-option.correct .letter { background: #2d7d2d; color: #fff; border-color: #2d7d2d; }
.quiz-option.wrong .letter { background: var(--accent); color: #fff; border-color: var(--accent); }

.fill-input {
  width: 100%; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: 4px;
  font-size: 14px; font-family: inherit;
  background: rgba(255,255,255,0.6); transition: border-color 0.2s;
}
.fill-input:focus { outline: none; border-color: var(--gold); }
.fill-input.correct { border-color: #2d7d2d; background: rgba(45,125,45,0.05); }
.fill-input.wrong { border-color: var(--accent); background: rgba(139,0,0,0.03); }

.quiz-check-btn {
  margin-top: 12px; padding: 8px 24px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 4px;
  font-family: inherit; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
}
.quiz-check-btn:hover { background: var(--accent-light); }
.quiz-result {
  margin-top: 10px; font-size: 14px;
  padding: 8px 14px; border-radius: 4px; display: none;
}
.quiz-result.show { display: block; }
.quiz-result.pass { background: rgba(45,125,45,0.1); color: #2d7d2d; }
.quiz-result.fail { background: rgba(139,0,0,0.08); color: var(--accent); }

/* 底部 */
.footer {
  text-align: center; padding: 20px 20px 12px;
  border-top: 1px solid rgba(196,168,130,0.3);
  position: relative;
}
.footer::before {
  content: '';
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  width: 160px; height: 10px;
  background: radial-gradient(ellipse at center, rgba(44,24,16,0.03) 0%, transparent 70%);
}
.footer-title {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 16px; color: var(--accent);
  margin-bottom: 12px; letter-spacing: 3px;
}
.footer img {
  width: 140px; border-radius: 8px;
  border: 1px solid rgba(196,168,130,0.3);
  box-shadow: 0 1px 6px var(--shadow);
}
.footer p { font-size: 12px; color: var(--ink-faint); margin-top: 8px; }

.back-top {
  position: fixed; bottom: 30px; right: 30px;
  width: 44px; height: 44px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 50%;
  font-size: 20px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(139,0,0,0.3); z-index: 80;
}
.back-top.show { display: flex; }

@media (max-width: 900px) {
  .grade-nav { padding: 6px 10px 8px; }
  .grade-nav-item { font-size: 12px; padding: 3px 10px; }
  .main { padding: 180px 16px 0; }
  .poem-tab { padding: 8px 12px; font-size: 12px; }
  .poem-tab-content { padding: 18px 16px; }
  .progress-bar { width: 120px; }
  .top-banner { padding: 20px 20px 16px; }
  .top-banner h1 { font-size: 26px; letter-spacing: 4px; }
  .top-progress { padding: 8px 16px; }
}
@media (max-width: 600px) {
  .top-banner h1 { font-size: 22px; letter-spacing: 3px; }
  .top-banner .subtitle { font-size: 11px; }
  .poem-text { font-size: 18px; }
  .grade-header h2 { font-size: 24px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-banner">
    <h1>小学生必背古诗词</h1>
    <div class="subtitle">1-6年级 · 古诗原文 · 白话译文 · 诗句赏析 · 创作背景 · 课后测试</div>
  </div>
  <div class="top-progress">
    <span class="label">学习进度</span>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-text" id="progressText">0 / 80 首</span>
    </div>
  </div>
</div>

<nav class="grade-nav" id="sidebar"></nav>
<div class="main" id="mainContent"></div>

poem:['江南可采莲，莲叶何田田。','鱼戏莲叶间。','鱼戏莲叶东，鱼戏莲叶西，','鱼戏莲叶南，鱼戏莲叶北。'],
authorInfo:'汉乐府是汉代设立的音乐机构，负责采集民间诗歌和文人创作，配乐演唱。这些诗歌统称"乐府诗"。《江南》是一首汉代民歌，收录于《乐府诗集》，是乐府诗中描写江南水乡生活的名篇。',
explanation:[
{orig:'江南可采莲，莲叶何田田。',text:'开篇点明江南水乡的特色——采莲。"可"字透露出采莲时节的喜悦。"田田"形容莲叶茂盛、铺满水面的样子，叠词的使用增强了节奏感和画面感。'},
{orig:'鱼戏莲叶间。',text:'一个"戏"字赋予鱼儿以人的情感，写出鱼在莲叶间欢快嬉戏的生动场景。'},
{orig:'鱼戏莲叶东，鱼戏莲叶西，鱼戏莲叶南，鱼戏莲叶北。',text:'四句用方位词的变化，描写鱼儿在莲叶间四处游动、忽东忽西的活泼景象。重复的句式不仅增强了音乐性，更营造出鱼儿欢快嬉戏、自由自在的氛围。'}
],
background:'这首诗是汉代江南地区的民歌，反映了当时江南水乡的采莲生活。采莲是古代江南重要的生产活动，也是青年男女表达爱慕之情的社交场合。"莲"与"怜"谐音，"鱼戏"暗喻男女间的嬉戏追逐，因此这首诗也带有爱情的色彩。',
extra:['"乐府"本是汉代官署名，后来成为一种诗歌体裁的名称','"田田"是形容莲叶茂盛的叠词，后代诗人常用','这首诗运用了反复手法，是中国诗歌"重章叠句"的典型'],
quizzes:[
{type:'choice',q:'"莲叶何田田"中"田田"形容什么？',options:['田地很多','莲叶茂盛','鱼儿很多','水波荡漾'],answer:1},
{type:'fill',q:'鱼戏莲叶____，鱼戏莲叶西。',answer:'东'},
{type:'judge',q:'这首诗后四句用方位变化描写鱼儿的活泼。',answer:true},
{type:'choice',q:'"鱼戏莲叶"中"戏"字体现了什么？',options:['鱼的速度很快','鱼儿欢快自在','鱼在觅食','鱼在逃避'],answer:1},
{type:'choice',q:'"莲"在古代诗歌中常与哪个字谐音？',options:['连','恋','怜','联'],answer:2}
]
},
{
id:'y1s3',grade:'一年级',semester:'上册',title:'画',author:'佚名',dynasty:'佚名',
fullTitle:'画（佚名）',
poem:['远看山有色，近听水无声。','春去花还在，人来鸟不惊。'],
authorInfo:'这首诗的作者已不可考，相传为唐代王维所作，但并无确切证据。正因如此，这首诗更加耐人寻味——诗人用四句看似矛盾的描写，巧妙地告诉我们：这画的是一幅画，而不是真实的景色。',
explanation:[
{orig:'远看山有色，',text:'远远看去，山上有鲜明的色彩。"有色"二字点出这是画中山的特征——画上的山色彩分明，而现实中的远山往往是朦胧的。'},
{orig:'近听水无声。',text:'走近了去听，水却没有声音。现实中的流水应当有声，这里"无声"说明画上的水虽然逼真，却不会流动发声。'},
{orig:'春去花还在，',text:'春天已经过去了，花依然还在盛开。现实中的花会随季节凋零，而画上的花永远保持盛开的状态。'},
{orig:'人来鸟不惊。',text:'人走过来，鸟儿也不受惊飞走。画中的鸟是静止的，不会像真鸟那样被人惊飞。'}
],
background:'这是一首经典的谜语诗，全诗描写了一幅山水画。每句都在说画中景物与真实景物的不同：山有颜色却远近相同，水无声，花不谢，鸟不飞。四句构成两组对仗工整的句子，既是写景，又是谜面，构思精巧。',
extra:['这首诗常被称为"画谜"，是中国最早的谜语诗之一','全诗运用了对比和反衬的手法，每句都暗含画与现实的区别','诗中"远/近""去/来""有/无""在/惊"构成了丰富的对仗'],
quizzes:[
{type:'choice',q:'这首诗描写的是什么？',options:['真实的山水','一幅画','春天的景色','鸟和花'],answer:1},
{type:'judge',q:'"近听水无声"说明画中的水不会流动。',answer:true},
{type:'fill',q:'远看山有____，近听水无声。',answer:'色'},
{type:'choice',q:'"人来鸟不惊"说明了什么？',options:['鸟儿很勇敢','这是一幅画','鸟儿在睡觉','人走得很轻'],answer:1},
{type:'choice',q:'这首诗运用的主要手法是？',options:['夸张','比喻','对比','拟人'],answer:2}
]
},
{
id:'y1s4',grade:'一年级',semester:'上册',title:'悯农（其二）',author:'李绅',dynasty:'唐',
fullTitle:'悯农（其二）（唐·李绅）',
poem:['锄禾日当午，汗滴禾下土。','谁知盘中餐，粒粒皆辛苦。'],
authorInfo:'李绅（772—846），字公垂，润州无锡（今江苏无锡）人，中唐诗人。他与元稹、白居易交往甚密，是新乐府运动的参与者。李绅一生写下《悯农》二首，流传千古，被誉为"悯农诗人"。',
explanation:[
{orig:'锄禾日当午，汗滴禾下土。',text:'正午烈日当空，农民在田间锄草松土，汗水一滴滴落入禾苗下的泥土。"日当午"点出时间的酷热，"汗滴"二字极具画面感，把农民的辛苦写得真切可感。'},
{orig:'谁知盘中餐，粒粒皆辛苦。',text:'谁知道碗里的饭食，每一粒都饱含着农民的辛勤劳动？"谁知"二字带有深沉的感叹，"粒粒"强调每一粒粮食的来之不易，警醒世人珍惜粮食。'}
],
background:'李绅年轻时目睹农民在烈日下辛勤劳作的场景，写下此诗。当时他尚未入仕，对底层百姓的疾苦有真切的体会。这首诗语言朴素却有力，成为中国最著名的劝诫诗之一，千百年来被用来教育孩子珍惜粮食。',
extra:['《悯农》共二首，"春种一粒粟"是其一，"锄禾日当午"是其二','这首诗是中国幼儿园和小学最早接触的古诗之一','"谁知盘中餐，粒粒皆辛苦"已成为中国人日常用语中的经典名句'],
quizzes:[
{type:'fill',q:'谁知盘中____，粒粒皆辛苦。',answer:'餐'},
{type:'choice',q:'"锄禾日当午"中"当午"是什么时候？',options:['早晨','正午','傍晚','半夜'],answer:1},
{type:'judge',q:'这首诗的目的是赞美农民的辛苦。',answer:true},
{type:'choice',q:'"粒粒皆辛苦"中的"皆"是什么意思？',options:['也','都','很','只'],answer:1},
{type:'choice',q:'这首诗告诉我们要怎么做？',options:['努力读书','珍惜粮食','多干活','少吃饭'],answer:1}
]
},
{
id:'y1s5',grade:'一年级',semester:'上册',title:'古朗月行（节选）',author:'李白',dynasty:'唐',
fullTitle:'古朗月行（节选）（唐·李白）',
poem:['小时不识月，呼作白玉盘。','又疑瑶台镜，飞在青云端。'],
authorInfo:'李白（701—762），字太白，号青莲居士，唐代最伟大的浪漫主义诗人，被后人誉为"诗仙"。他出生于碎叶城（今吉尔吉斯斯坦），五岁随父迁居四川。李白一生豪放不羁，诗风飘逸奔放，想象奇特丰富。',
explanation:[
{orig:'小时不识月，呼作白玉盘。',text:'小时候不认识月亮，把它叫做白玉做的盘子。用孩子天真的视角看月亮，"白玉盘"这个比喻既写出月亮的圆润洁白，又充满童趣。'},
{orig:'又疑瑶台镜，飞在青云端。',text:'又怀疑它是仙宫瑶台上的一面镜子，飞到了高高的云端。"疑"字写出孩子丰富的想象力，"瑶台镜"把月亮比作仙家之物，"飞"字更添奇幻色彩。'}
],
background:'《古朗月行》是李白借乐府古题写的诗，原诗共十六句，这里节选了前四句。李白以儿童的天真视角写月亮，实际上是以童年的纯真反衬成年后的忧愁。全诗后半部分感叹月有圆缺、人有离合，带有深沉的人生感慨。',
extra:['"白玉盘"和"瑶台镜"是古代描写月亮的两个经典比喻','李白的月亮诗还有很多，如"举头望明月""举杯邀明月"等','这首诗的"行"是乐府诗的一种体裁，音"形"'],
quizzes:[
{type:'choice',q:'"呼作白玉盘"中"白玉盘"比喻什么？',options:['白色的盘子','月亮','镜子','云朵'],answer:1},
{type:'fill',q:'小时不识月，呼作白玉____。',answer:'盘'},
{type:'judge',q:'"又疑瑶台镜"说明孩子怀疑月亮是仙宫的镜子。',answer:true},
{type:'choice',q:'"飞在青云端"的"飞"字有什么效果？',options:['写出月亮很高','增添奇幻色彩','说明月亮很亮','形容云在动'],answer:1},
{type:'choice',q:'李白被后人称为什么？',options:['诗圣','诗仙','诗佛','诗鬼'],answer:1}
]
},
{
id:'y1s6',grade:'一年级',semester:'上册',title:'风',author:'李峤',dynasty:'唐',
fullTitle:'风（唐·李峤）',
poem:['解落三秋叶，能开二月花。','过江千尺浪，入竹万竿斜。'],
authorInfo:'李峤（约645—约714），字巨山，赵州赞皇（今河北赞皇）人，唐代诗人。他与杜审言、崔融、苏味道并称"文章四友"。李峤一生作诗极多，其中有不少咏物诗，以词采华美著称。',
explanation:[
{orig:'解落三秋叶，',text:'风能吹落深秋的树叶。"解"字在这里是"能、会"的意思，赋予风以主动性。"三秋"指晚秋，万物凋零的时节。'},
{orig:'能开二月花。',text:'风能催开早春二月的花朵。与上句对照，风既能"落"也能"开"，展现了风的两面力量。'},
{orig:'过江千尺浪，',text:'风吹过江面，掀起千尺巨浪。"千尺"是夸张的写法，极言风力之大。'},
{orig:'入竹万竿斜。',text:'风吹入竹林，万竿竹子都随风倾斜。"万竿"与"千尺"对仗工整，画面感极强。'}
],
background:'这是一首咏物诗，全诗不着一个"风"字，却句句写风。诗人通过风对不同事物的作用——落叶、开花、掀浪、斜竹——来表现风的存在和力量。这种"不写之写"的手法是中国咏物诗的高级技巧。',
extra:['这首诗最大的特点是全诗不出现"风"字，却处处写风','四句分别写了风在四季中的不同表现','这是唐代咏物诗的经典范本'],
quizzes:[
{type:'choice',q:'这首诗全篇没有出现哪个字？',options:['叶','花','风','水'],answer:2},
{type:'fill',q:'过江千尺____，入竹万竿斜。',answer:'浪'},
{type:'judge',q:'"解落三秋叶"是说风能吹落秋天的叶子。',answer:true},
{type:'choice',q:'"入竹万竿斜"描写的是什么场景？',options:['风吹竹林','雨打竹林','人砍竹子','竹子生长'],answer:0},
{type:'choice',q:'"解"字在"解落三秋叶"中是什么意思？',options:['解开','理解','能、会','分解'],answer:2}
]
},

{
id:'y1x1',grade:'一年级',semester:'下册',title:'春晓',author:'孟浩然',dynasty:'唐',
fullTitle:'春晓（唐·孟浩然）',
poem:['春眠不觉晓，处处闻啼鸟。','夜来风雨声，花落知多少。'],
authorInfo:'孟浩然（689—740），名浩，字浩然，襄阳（今湖北襄阳）人，世称"孟襄阳"。他是唐代著名的山水田园诗人，与王维并称"王孟"。孟浩然一生未曾入仕，以布衣终老，但诗名极高。他的诗风格清淡自然，意境深远。',
explanation:[
{orig:'春眠不觉晓，',text:'春天的夜晚睡得香甜，不知不觉天就亮了。"不觉"二字写出春眠的舒适，也暗示一夜好眠。'},
{orig:'处处闻啼鸟。',text:'醒来后到处都能听到鸟儿的啼叫。"处处"写鸟声之多，也写出春天的生机勃勃。'},
{orig:'夜来风雨声，',text:'回想起夜里的风雨声。由眼前的鸟鸣转入回忆，增添了诗的层次感。'},
{orig:'花落知多少。',text:'不知道花儿被风雨打落了多少。一个"知"字写出对落花的惋惜，流露出淡淡的惜春之情。'}
],
background:'这首诗是孟浩然隐居鹿门山时所作。一个春天的早晨，诗人从睡梦中醒来，听到鸟鸣，回想起夜里的风雨，不禁为落花感到惋惜。全诗语言平易自然，却蕴含着对春天的热爱和对美好事物易逝的感叹。',
extra:['孟浩然是"山水田园诗派"的代表诗人','这首诗是唐代五言绝句的代表作','"春眠不觉晓"是中国人最熟悉的诗句之一'],
quizzes:[
{type:'choice',q:'"春眠不觉晓"中"晓"是什么意思？',options:['知道','天亮','早上','中午'],answer:1},
{type:'fill',q:'夜来风雨____，花落知多少。',answer:'声'},
{type:'judge',q:'诗人醒来后心情很悲伤。',answer:false},
{type:'choice',q:'"花落知多少"表达了什么情感？',options:['对落花的惋惜','对春天的赞美','对鸟的喜欢','对雨的讨厌'],answer:0},
{type:'choice',q:'孟浩然与哪位诗人并称"王孟"？',options:['李白','杜甫','王维','白居易'],answer:2}
]
},
{
id:'y1x2',grade:'一年级',semester:'下册',title:'赠汪伦',author:'李白',dynasty:'唐',
fullTitle:'赠汪伦（唐·李白）',
poem:['李白乘舟将欲行，忽闻岸上踏歌声。','桃花潭水深千尺，不及汪伦送我情。'],
authorInfo:'李白（701—762），字太白，号青莲居士，唐代最伟大的浪漫主义诗人，被后人誉为"诗仙"。李白一生豪放不羁，好饮酒，广交友，足迹遍布大半个中国。他与汪伦的故事是中国文学史上最动人的友谊佳话之一。',
explanation:[
{orig:'李白乘舟将欲行，忽闻岸上踏歌声。',text:'李白坐上船正要离开，忽然听到岸上传来汪伦踏着节拍唱歌送行的声音。"将欲"写出即将离别的紧张感，"忽闻"写出意外的惊喜，"踏歌声"点出汪伦用歌声送行的质朴方式。'},
{orig:'桃花潭水深千尺，不及汪伦送我情。',text:'桃花潭的水有一千尺深，却比不上汪伦送别我的情谊。用潭水之深来衬托友情之深，"不及"二字将抽象的感情化为可比的具体形象，感情真挚动人。'}
],
background:'汪伦是安徽泾县的一个普通人，他非常仰慕李白的才华，写信邀请李白来家中做客，信中说："先生好游乎？此地有十里桃花。先生好饮乎？此地有万家酒店。"李白欣然前往，到了才发现"桃花"是潭水名，"万家"是店主姓。两人相处多日，感情深厚。李白离开时，汪伦在岸边踏歌送行，李白深受感动，写下此诗。',
extra:['桃花潭位于安徽省宣城市泾县','"踏歌"是古代一种用脚踏节拍唱歌的送别方式','这首诗是送别诗中的经典，以"以水喻情"的手法著称'],
quizzes:[
{type:'choice',q:'"不及汪伦送我情"中"不及"是什么意思？',options:['不来得及','比不上','不到','不如下'],answer:1},
{type:'fill',q:'桃花潭水深千____，不及汪伦送我情。',answer:'尺'},
{type:'judge',q:'汪伦是用唱歌的方式为李白送行。',answer:true},
{type:'choice',q:'这首诗用什么来比喻友情的深厚？',options:['高山','大海','桃花潭水','白云'],answer:2},
{type:'choice',q:'汪伦用什么方式邀请到了李白？',options:['写诗','写信说有桃花和酒','亲自去请','托人带话'],answer:1}
]
},
{
id:'y1x3',grade:'一年级',semester:'下册',title:'静夜思',author:'李白',dynasty:'唐',
fullTitle:'静夜思（唐·李白）',
poem:['床前明月光，疑是地上霜。','举头望明月，低头思故乡。'],
authorInfo:'李白（701—762），字太白，号青莲居士，唐代最伟大的浪漫主义诗人，被后人誉为"诗仙"。《静夜思》是李白最脍炙人口的作品之一，千百年来广为传诵，是每一个中国人最早学会的古诗之一。',
explanation:[
{orig:'床前明月光，',text:'床前洒满了明亮的月光。一个"明"字写出月光的皎洁，也暗示了夜的宁静。'},
{orig:'疑是地上霜。',text:'诗人恍惚中以为是地上铺了一层白霜。"疑"字写出半梦半醒间的恍惚，也为月光增添了一层清冷的意境。'},
{orig:'举头望明月，',text:'抬起头来仰望天上的明月。由"疑"到"望"，诗人从恍惚中清醒过来。'},
{orig:'低头思故乡。',text:'低下头不禁思念起远方的故乡。"举头"与"低头"两个动作的对比，写出了从望月到思乡的情感过渡，自然而深沉。'}
],
background:'这首诗写于李白客居扬州期间。一个月明之夜，诗人独自在旅馆中，看到窗外的月光洒在地上，勾起了对故乡的无限思念。李白的故乡在四川，此时他远离家乡，漂泊在外，月光成了连接他与故乡的纽带。',
extra:['这首诗被认为是唐诗中流传最广的作品','"举头望明月，低头思故乡"已成为中国人思乡的代名词','关于"床"的解释有多种说法：睡床、井栏、胡床等'],

{type:'choice',q:'诗中哪两个动作对比写出了思乡？',options:['坐和站','走和停','举头和低头','开门和关门'],answer:2},

]

fullTitle:'寻隐者不遇（唐·贾岛）',
poem:['松下问童子，言师采药去。','只在此山中，云深不知处。'],
authorInfo:'贾岛（779—843），字浪仙，范阳（今北京附近）人，唐代诗人。他早年出家为僧，后还俗参加科举。贾岛以苦吟著称，"推敲"的典故就出自他。',
explanation:[
{orig:'松下问童子，',text:'诗人在松树下询问隐者的书童。"松下"点出隐者居处的清幽环境。'},
{orig:'言师采药去。',text:'童子回答说师傅采药去了。简洁的对话写出隐者的行踪。'},
{orig:'只在此山中，',text:'童子说师傅就在这座山里。给人一线希望，却又无法确定。'},
{orig:'云深不知处。',text:'但山中云雾弥漫，不知道他具体在哪里。"云深"既写实山中的云雾，又增添了隐者的神秘感，也流露出诗人寻而不遇的淡淡惆怅。'}
],
background:'这首诗是贾岛去山中寻访一位隐士而不得时所作。全诗以问答的形式展开，诗人问了什么没有直接写，只通过童子的回答来体现。这种"省略问句"的手法极为精妙。',
extra:['贾岛"推敲"的故事：他在驴背上反复斟酌用"推"还是"敲"，冲撞了韩愈的车队','这首诗的问答结构在中国诗歌中独树一帜','"云深不知处"后人常用来说找不到某人或某物'],
quizzes:[
{type:'choice',q:'诗人去找谁？',options:['童子','朋友','师傅（隐者）','家人'],answer:2},
{type:'fill',q:'只在此山中，云深不知____。',answer:'处'},
{type:'judge',q:'诗人最终找到了隐者。',answer:false},
{type:'choice',q:'"云深不知处"有什么含义？',options:['山太高了','云雾弥漫看不清路','隐者行踪神秘','以上都有'],answer:3},
{type:'choice',q:'贾岛因什么文学典故闻名？',options:['推敲','铁杵成针','悬梁刺股','画龙点睛'],answer:0}
]
},
{
id:'y1x5',grade:'一年级',semester:'下册',title:'池上',author:'白居易',dynasty:'唐',
fullTitle:'池上（唐·白居易）',
poem:['小娃撑小艇，偷采白莲回。','不解藏踪迹，浮萍一道开。'],
authorInfo:'白居易（772—846），字乐天，号香山居士，唐代伟大的现实主义诗人。他一生作诗近三千首，是唐代存诗最多的诗人之一。白居易主张"文章合为时而著，歌诗合为事而作"，诗风通俗平易。',
explanation:[
{orig:'小娃撑小艇，偷采白莲回。',text:'一个小孩撑着小船，偷偷去池塘里采了白莲花回来。"小娃"与"小艇"的两个"小"字写出了孩童的可爱，"偷"字更添童趣，写出孩子瞒着大人去玩耍的顽皮劲儿。'},
{orig:'不解藏踪迹，浮萍一道开。',text:'他不懂得隐藏自己的行踪，小船经过的地方，浮萍被推开，留下一道清晰的水路。"不解"写出孩子的天真不懂事，"一道开"用浮萍的痕迹暗示行踪暴露，画面生动有趣。'}
],
background:'这首诗是白居易在洛阳时所作，描写了一个小孩偷偷撑船去采白莲花的有趣场景。诗人以旁观者的角度，用简洁的语言捕捉到了儿童天真顽皮的瞬间。',
extra:['白居易的诗以"通俗易懂"著称，这首诗正是代表','"不解藏踪迹"后人常用来说做事不懂得隐藏','这首诗展现了儿童天真顽皮的天性'],
quizzes:[

{type:'judge',q:'小孩很聪明地隐藏了自己的行踪。',answer:false},
{type:'choice',q:'"浮萍一道开"说明了什么？',options:['池塘很大','小孩的船经过了这里','浮萍很多','莲花开了'],answer:1},
{type:'choice',q:'白居易写诗的特点是什么？',options:['深奥难懂','通俗平易','华丽辞藻','悲壮豪放'],answer:1}
]

poem:['泉眼无声惜细流，树阴照水爱晴柔。','小荷才露尖尖角，早有蜻蜓立上头。'],
authorInfo:'杨万里（1127—1206），字廷秀，号诚斋，吉水（今江西吉水）人，南宋著名诗人。他一生创作了两万多首诗，是中国文学史上存诗最多的诗人之一。杨万里的诗风清新活泼，善于捕捉自然界中细微的景物和情趣，被称为"诚斋体"。',
explanation:[
{orig:'泉眼无声惜细流，',text:'泉水从泉眼中无声地流出，仿佛珍惜这细细的水流一般。"惜"字运用拟人手法，赋予泉眼以人的情感。'},
{orig:'树阴照水爱晴柔。',text:'树荫映照在水面上，似乎也喜爱这晴天的柔和风光。"爱"字同样拟人化，写出了树荫与水的和谐画面。'},
{orig:'小荷才露尖尖角，',text:'嫩嫩的荷叶刚刚露出水面，还是尖尖的小角。"才"字写出初夏时节荷叶初生的状态。'},
{orig:'早有蜻蜓立上头。',text:'就已经有蜻蜓飞来停在上面了。"早有"与"才露"对照，写出了蜻蜓的敏锐和小荷的可爱，构成一幅生动的初夏小景。'}
],
background:'这首诗是杨万里途经浙江衢州时所作。诗人被一个小小的池塘吸引，用细腻的笔触描绘了泉眼、树荫、荷叶、蜻蜓等景物，展现了初夏时节小池塘的生机与情趣。"小荷才露尖尖角"后来成为比喻新人崭露头角的名句。',
extra:['"小荷才露尖尖角"后常用来比喻新人或新事物崭露头角','杨万里的"诚斋体"以清新活泼著称','这首诗从微观视角写自然，体现了宋代诗歌的细腻风格'],
quizzes:[

{type:'fill',q:'泉眼无声惜细流，树阴照水爱晴____。',answer:'柔'},
{type:'judge',q:'蜻蜓在荷叶还没露出水面时就停在上面了。',answer:false},
{type:'choice',q:'"惜"和"爱"在诗中运用了什么修辞？',options:['夸张','比喻','拟人','排比'],answer:2},
{type:'choice',q:'"小荷才露尖尖角"后来常用来比喻什么？',options:['花开','新人崭露头角','下雨','天晴'],answer:1}
]
},
{

poem:['头上红冠不用裁，满身雪白走将来。','平生不敢轻言语，一叫千门万户开。'],
authorInfo:'唐寅（1470—1524），字伯虎，号六如居士，吴县（今江苏苏州）人，明代著名画家、书法家、诗人。他与祝允明、文徵明、徐祯卿并称"吴中四才子"。唐寅才华横溢却命运坎坷，被誉为"江南第一才子"。',
explanation:[
{orig:'头上红冠不用裁，满身雪白走将来。',text:'头上的红冠不用裁剪就是天生的，一身雪白的羽毛走过来。"不用裁"写出大公鸡天生丽质，"满身雪白"与"红冠"形成鲜明的色彩对比。'},
{orig:'平生不敢轻言语，',text:'它平时从不轻易开口鸣叫。"不敢轻言语"拟人化地写出了公鸡平时的沉稳。'},
{orig:'一叫千门万户开。',text:'但一旦鸣叫，千家万户都要被唤醒。这是写公鸡报晓的功能，"千门万户"夸张地写出鸡鸣声的影响力。'}
],
background:'这首诗是唐寅为自己画的雄鸡图所题的诗。画中的雄鸡威武雄壮，诗人借画咏志，以鸡喻人——平时沉稳低调，关键时刻一鸣惊人。这也暗含了唐寅对自己才华的自信和怀才不遇的感慨。',
extra:['唐伯虎是中国民间故事中家喻户晓的人物','这首诗既是题画诗，也是咏物诗','"一叫千门万户开"后来常用来比喻一鸣惊人'],
quizzes:[

{type:'fill',q:'平生不敢轻言____，一叫千门万户开。',answer:'语'},

{type:'choice',q:'这首诗借公鸡表达了什么？',options:['爱吃鸡肉','平时沉稳，关键时刻一鸣惊人','喜欢早起','养鸡很重要'],answer:1}
]
},

poem:['墙角数枝梅，凌寒独自开。','遥知不是雪，为有暗香来。'],
authorInfo:'王安石（1021—1086），字介甫，号半山，临川（今江西抚州）人，北宋杰出的政治家、文学家、思想家。他推行"王安石变法"，是中国历史上著名的改革家。文学上，他诗文俱佳，为"唐宋八大家"之一，诗歌风格遒劲清新。',
explanation:[
{orig:'墙角数枝梅，凌寒独自开。',text:'墙角有几枝梅花，冒着严寒独自盛开。"墙角"写出梅花生长环境的偏僻冷落，"凌寒"点出冬天的严寒，"独自"突出梅花不畏严寒、傲然独立的品格。'},
{orig:'遥知不是雪，为有暗香来。',text:'远远就知道那不是雪，因为有阵阵幽香飘来。"遥知"写出诗人对梅花的熟悉，"暗香"是梅花特有的清香，"为有"二字巧妙地用嗅觉来辨别视觉上的相似。'}
],
background:'这首诗是王安石变法失败后退居南京时所作。诗人以梅花自喻，表达自己虽身处困境（墙角、凌寒），仍坚守高洁品格的决心。梅花的"凌寒独自开"正是诗人不屈不挠精神的写照。',

quizzes:[

]
},

authorInfo:'胡令能（约785—约830），唐代诗人，莆田（今福建莆田）人。他年轻时做过手工匠人，以修补锅碗为生，人称"胡钉铰"。后隐居不仕，以写诗自娱。他的诗语言通俗，生活气息浓厚。',
explanation:[
{orig:'蓬头稚子学垂纶，侧坐莓苔草映身。',text:'一个头发蓬乱的小孩在学钓鱼，侧身坐在长满青苔的草丛中，身影被野草遮掩。"蓬头"写出孩子的不拘小节，"侧坐"写出随意自然的姿态，"草映身"写出隐蔽的样子。'},
{orig:'路人借问遥招手，怕得鱼惊不应人。',text:'过路人想问路，小孩远远地就摆手示意不要出声——他怕说话声把鱼儿吓跑了。"遥招手"写出孩子专注钓鱼的认真劲儿，"怕得鱼惊"更是把孩子天真可爱的心理写得活灵活现。'}
],
background:'这首诗是胡令能路过一个小村庄时，看到一个小孩在河边钓鱼的场景。诗人被小孩专注认真的样子打动，写下此诗。全诗没有一个难字，却把小儿垂钓的神态和心理刻画得栩栩如生。',
extra:['胡令能从手工艺人转型为诗人，是中国文学史上的佳话','这首诗的心理描写尤为出色——"怕得鱼惊"写出孩子的内心活动','"蓬头"并非贬义，而是写出小孩不拘小节的天真'],
quizzes:[

]

{orig:'欲穷千里目，更上一层楼。',text:'要想看到更远的地方，就要再登上一层楼。这两句由写景转入说理，道出了"站得高才能看得远"的人生哲理，千百年来激励着无数人。'}
],
background:'鹳雀楼位于今山西省永济市，因常有鹳雀（一种水鸟）栖息其上而得名，是唐代著名的登高胜地。王之涣登上此楼，被壮丽的景色所震撼，写下了这首千古名篇。',

id:'y2s4',grade:'二年级',semester:'上册',title:'望庐山瀑布',author:'李白',dynasty:'唐',
fullTitle:'望庐山瀑布（唐·李白）',
poem:['日照香炉生紫烟，遥看瀑布挂前川。','飞流直下三千尺，疑是银河落九天。'],
authorInfo:'李白（701—762），字太白，号青莲居士，唐代最伟大的浪漫主义诗人，被后人誉为"诗仙"。这首诗是他游历庐山时所作，以夸张的手法描绘了庐山瀑布的壮观景象。',
explanation:[
{orig:'日照香炉生紫烟，',text:'阳光照在香炉峰上，升起了紫色的烟雾。"生"字写出烟雾的缭绕升腾，"紫烟"为瀑布增添了神秘色彩。'},
{orig:'遥看瀑布挂前川。',text:'远远看去，瀑布像一匹白布挂在山前的河流上。"挂"字用得极妙，把飞流的瀑布定格为静态画面，以静写动。'},
{orig:'飞流直下三千尺，',text:'瀑布飞速奔流，从高处直泻而下，仿佛有三千尺长。"飞流"写出瀑布的迅疾，"直下"写出其笔直的走势，"三千尺"是夸张的手法。'},
{orig:'疑是银河落九天。',text:'让人怀疑是银河从九天之上倾泻下来。"疑"字既是比喻又是惊叹，把瀑布的壮美推向极致。'}
],
background:'庐山位于江西省九江市，香炉峰是庐山的一座山峰。李白游庐山时，被瀑布的壮观景象深深震撼，写下了这首气势磅礴的诗。全诗运用了丰富的想象和夸张，将瀑布比作银河，展现了李白诗歌的浪漫主义风格。',
extra:['香炉峰因峰顶常有云雾缭绕如香炉中的烟而得名','这首诗是描写瀑布的千古名篇，"飞流直下三千尺"已成为形容瀑布的经典用语','李白的夸张手法在这首诗中达到了极致'],
quizzes:[
{type:'choice',q:'"飞流直下三千尺"用了什么修辞手法？',options:['比喻','拟人','夸张','排比'],answer:2},
{type:'fill',q:'疑是银河落____天。',answer:'九'},
{type:'judge',q:'"三千尺"是说瀑布真的有三千尺长。',answer:false},
{type:'choice',q:'"挂前川"的"挂"字好在哪里？',options:['写出瀑布很高','以静写动，把瀑布比作白布','说明瀑布很宽','写出水流很急'],answer:1},
{type:'choice',q:'庐山瀑布位于哪个省？',options:['湖南','安徽','江西','浙江'],answer:2}
]
},

id:'y2s5',grade:'二年级',semester:'上册',title:'江雪',author:'柳宗元',dynasty:'唐',
fullTitle:'江雪（唐·柳宗元）',
poem:['千山鸟飞绝，万径人踪灭。','孤舟蓑笠翁，独钓寒江雪。'],
authorInfo:'柳宗元（773—819），字子厚，河东（今山西运城）人，世称"柳河东"。唐代杰出的文学家、思想家，与韩愈并称"韩柳"，同为"唐宋八大家"。柳宗元一生仕途坎坷，被贬永州期间写下了大量名篇。',
explanation:[
{orig:'千山鸟飞绝，万径人踪灭。',text:'千座山上飞鸟的踪迹已绝，万条路上行人的足迹全无。"千山""万径"极言空间的广阔，"绝""灭"二字写出了天地间万籁俱寂的严寒景象。'},
{orig:'孤舟蓑笠翁，独钓寒江雪。',text:'一条孤零零的小船上，坐着一位披着蓑衣、戴着斗笠的老人，在大雪纷飞的江面上独自垂钓。"孤""独"二字突出了老翁的孤独与坚毅，"寒江雪"三个字将全诗的意境推向极致。'}
],
background:'这首诗是柳宗元被贬永州时所作。当时他政治失意，内心孤寂。诗人以"独钓寒江雪"的渔翁自比，表达自己虽遭贬谪，仍坚守高洁品格、不向世俗妥协的决心。',
extra:['这首诗被誉为"唐诗五言绝句中意境最高之作"','全诗仅二十字，却描绘了一个完整的冰雪世界','"千山鸟飞绝，万径人踪灭"的对仗极为工整'],
quizzes:[

{type:'fill',q:'孤舟蓑笠____，独钓寒江雪。',answer:'翁'},
{type:'judge',q:'这首诗表达了诗人孤独寂寞的心情。',answer:true},
{type:'choice',q:'"千山鸟飞绝"中"绝"是什么意思？',options:['绝对','消失','断绝','绝妙'],answer:1},
{type:'choice',q:'诗人用渔翁自比表达了什么？',options:['喜欢钓鱼','坚守高洁品格','向往自由','逃避现实'],answer:1}
]
},
{
id:'y2s6',grade:'二年级',semester:'上册',title:'夜宿山寺',author:'李白',dynasty:'唐',
fullTitle:'夜宿山寺（唐·李白）',
poem:['危楼高百尺，手可摘星辰。','不敢高声语，恐惊天上人。'],
authorInfo:'李白（701—762），字太白，号青莲居士，唐代最伟大的浪漫主义诗人，被后人誉为"诗仙"。这首诗以大胆的想象和夸张的手法，描写了山寺的高耸入云。',
explanation:[
{orig:'危楼高百尺，',text:'山上的寺庙高有百尺。"危"在这里是"高"的意思，"百尺"是夸张的说法，极言寺楼之高。'},
{orig:'手可摘星辰。',text:'站在楼上仿佛一伸手就能摘到天上的星星。这是极度的夸张，以手可摘星来写楼之高，想象奇特。'},
{orig:'不敢高声语，',text:'在这里不敢大声说话。由夸张转入细腻的心理描写。'},
{orig:'恐惊天上人。',text:'怕惊动了天上的神仙。与"手可摘星辰"呼应，写出楼高得接近天界，充满了浪漫主义的想象。'}
],
background:'这首诗是李白夜宿在一座高山寺庙时所作。诗人被寺庙的高耸所震撼，用夸张和想象写出了山寺之高。全诗语言简洁，想象奇特，充分体现了李白诗歌的浪漫主义风格。',
extra:['"危楼"不是危险的楼，而是高楼的意思','这首诗的夸张手法——"手可摘星辰"——是中国诗歌中最著名的夸张之一','全诗用"不敢"和"恐"写出了一种敬畏感，增添了诗意'],
quizzes:[
{type:'choice',q:'"危楼高百尺"中"危"是什么意思？',options:['危险','高','摇晃','害怕'],answer:1},
{type:'fill',q:'不敢高声语，恐惊天上____。',answer:'人'},
{type:'judge',q:'"手可摘星辰"是说楼真的能碰到星星。',answer:false},
{type:'choice',q:'诗人为什不敢高声说话？',options:['怕吵到别人','怕惊动天上的人','寺里有规定','自己声音小'],answer:1},
{type:'choice',q:'这首诗体现了李白什么风格？',options:['现实主义','浪漫主义','边塞风格','田园风格'],answer:1}
]
},
{
id:'y2s7',grade:'二年级',semester:'上册',title:'敕勒歌',author:'北朝民歌',dynasty:'北朝',
fullTitle:'敕勒歌（北朝民歌）',
poem:['敕勒川，阴山下。','天似穹庐，笼盖四野。','天苍苍，野茫茫，风吹草低见牛羊。'],
authorInfo:'《敕勒歌》是北朝时期的民歌，收录于《乐府诗集》。敕勒是北方的一个游牧民族，生活在今内蒙古一带。这首民歌描绘了北方草原的壮丽景色，是中国文学史上描写草原的千古名篇。',
explanation:[
{orig:'敕勒川，阴山下。',text:'敕勒族生活的平原，在阴山的脚下。开篇点明地点，简洁有力。'},
{orig:'天似穹庐，笼盖四野。',text:'天空像蒙古包一样，笼罩着广阔的原野。"穹庐"就是游牧民族居住的帐篷，这个比喻既形象又贴切，写出了天的辽阔和圆。'},
{orig:'天苍苍，野茫茫，风吹草低见牛羊。',text:'天空苍茫无边，原野辽阔无际，风吹过，牧草低伏，露出了成群的牛羊。"苍苍""茫茫"叠词的使用增强了空间的辽阔感，"风吹草低见牛羊"是全诗的点睛之笔，以动写静，画面感极强。'}
],
background:'这首歌是北朝敕勒族的民歌，反映了游牧民族在草原上放牧的生活。诗歌以朴素的语言描绘了草原的辽阔壮美，表达了敕勒人对家乡草原的热爱和自豪。相传北齐神武帝高欢曾命斛律金唱此歌，以激励士气。',
extra:['"见"在这里读"xiàn"，是"出现"的意思','这首诗是中国文学史上描写草原最著名的诗篇','"天似穹庐"的比喻体现了游牧民族独特的审美视角'],
quizzes:[
{type:'choice',q:'"天似穹庐"中"穹庐"是什么？',options:['天空','蒙古包','帽子','山峰'],answer:1},
{type:'fill',q:'天苍苍，野茫茫，风吹草低见牛____。',answer:'羊'},
{type:'judge',q:'"见牛羊"的"见"读"jiàn"。',answer:false},
{type:'choice',q:'这首诗描写的是哪里的景色？',options:['江南水乡','北方草原','西部沙漠','南方山区'],answer:1},
{type:'choice',q:'"风吹草低见牛羊"运用了什么手法？',options:['比喻','以动写静','夸张','拟人'],answer:1}
]
},

authorInfo:'高鼎（约1821—约1880），字象一，又字拙吾，仁和（今浙江杭州）人，清代诗人。他一生大部分时间过着隐居生活，诗风清新自然。《村居》是他最著名的作品，描绘了春天农村的美丽景色和儿童的欢乐。',
explanation:[

{orig:'拂堤杨柳醉春烟。',text:'杨柳轻拂堤岸，仿佛沉醉在春天的烟雾中。"醉"字运用拟人手法，写出杨柳在春色中的柔美姿态。'},
{orig:'儿童散学归来早，',text:'孩子们放学回来得早。"散学"就是放学的意思。'},
{orig:'忙趁东风放纸鸢。',text:'忙着趁着东风放风筝。"忙趁"写出孩子们迫不及待放风筝的急切心情，"纸鸢"就是风筝。'}
],

extra:['"纸鸢"是风筝的古称，风筝在中国有两千多年的历史','"东风"在古诗中常指春风','这首诗是描写春天最著名的七言绝句之一'],

{type:'choice',q:'"醉春烟"的"醉"用了什么修辞？',options:['比喻','拟人','夸张','排比'],answer:1}
]

{
id:'y2x2',grade:'二年级',semester:'下册',title:'咏柳',author:'贺知章',dynasty:'唐',
fullTitle:'咏柳（唐·贺知章）',
poem:['碧玉妆成一树高，万条垂下绿丝绦。','不知细叶谁裁出，二月春风似剪刀。'],
authorInfo:'贺知章（约655—约733），字季真，自号四明狂客，越州永兴（今浙江萧山）人，唐代诗人。他性格旷达不羁，好饮酒，与张若虚、张旭、包融并称"吴中四士"。晚年辞官归乡，写下著名的《回乡偶书》。',
explanation:[
{orig:'碧玉妆成一树高，',text:'整棵柳树像用碧玉装扮而成，高高地矗立着。"碧玉"既写出柳叶的翠绿，又暗含柳树如美人的意象。'},
{orig:'万条垂下绿丝绦。',text:'千万条柳枝像绿色的丝带一样垂下来。"丝绦"是丝织的带子，这个比喻既写出柳条的柔美，又写出其随风飘动的姿态。'},
{orig:'不知细叶谁裁出，',text:'不知道这细细的柳叶是谁裁剪出来的。"裁"字用得精妙，把春风比作裁缝。'},
{orig:'二月春风似剪刀。',text:'原来二月的春风就像一把剪刀。这个比喻新颖奇特，把无形的春风化为有形的剪刀，形象生动。'}
],
background:'这首诗是贺知章在长安时所作。诗人看到初春时节柳树发芽的美丽景象，赞叹大自然的神奇。诗人用问答的方式，把春风比作剪刀，构思巧妙，是咏物诗中的经典。',
extra:['"碧玉"在这里一语双关，既指玉石，也暗指年轻美人','"二月春风似剪刀"是千古名句，后人常用','这首诗是贺知章最著名的作品之一'],
quizzes:[
{type:'choice',q:'"碧玉妆成一树高"中"碧玉"比喻什么？',options:['玉石','柳树的翠绿颜色','河水','天空'],answer:1},
{type:'fill',q:'不知细叶谁裁出，二月春风似剪____。',answer:'刀'},
{type:'judge',q:'这首诗把春风比作了剪刀。',answer:true},
{type:'choice',q:'"万条垂下绿丝绦"中"丝绦"是什么？',options:['绳子','丝带','头发','河流'],answer:1},
{type:'choice',q:'这首诗主要描写的是什么植物？',options:['竹子','松树','柳树','桃树'],answer:2}
]
},
{
id:'y2x3',grade:'二年级',semester:'下册',title:'赋得古原草送别（节选）',author:'白居易',dynasty:'唐',
fullTitle:'赋得古原草送别（节选）（唐·白居易）',
poem:['离离原上草，一岁一枯荣。','野火烧不尽，春风吹又生。'],
authorInfo:'白居易（772—846），字乐天，号香山居士，唐代伟大的现实主义诗人。这首诗是白居易十六岁时所作，相传他拿着这首诗去拜访当时的大诗人顾况，顾况看到他的名字"居易"，开玩笑说"长安米贵，居大不易"，但读到"野火烧不尽，春风吹又生"时，大为赞赏。',
explanation:[
{orig:'离离原上草，',text:'原野上的草长得非常茂盛。"离离"形容草木繁茂的样子。'},
{orig:'一岁一枯荣。',text:'每年都会经历一次枯萎和繁荣。"枯荣"概括了草的生命循环。'},
{orig:'野火烧不尽，',text:'野火虽然凶猛，却烧不尽地下的草根。'},
{orig:'春风吹又生。',text:'春风一吹，小草又蓬勃生长。"野火烧不尽，春风吹又生"是千古名句，写出了小草顽强的生命力。'}
],
background:'这首诗是白居易十六岁时到长安参加科举考试前，为准备考试而作的"试帖诗"。诗人以古原上的野草为题，歌颂了小草顽强不屈的生命力。"野火烧不尽，春风吹又生"后来成为形容生命力顽强的经典名句。',
extra:['这首诗是白居易的成名作','"野火烧不尽，春风吹又生"常用来比喻事物的生命力顽强','原诗是送别诗，这里节选了前四句'],
quizzes:[
{type:'choice',q:'"离离"形容什么？',options:['离开','草木茂盛','整齐','孤独'],answer:1},
{type:'fill',q:'野火烧不尽，春风____又生。',answer:'吹'},
{type:'judge',q:'这首诗赞美了小草顽强的生命力。',answer:true},
{type:'choice',q:'白居易写这首诗时大约多大？',options:['六岁','十六岁','二十六岁','三十六岁'],answer:1},
{type:'choice',q:'"野火烧不尽"说明什么？',options:['草很少','草根很深','火烧不灭','草很坚强'],answer:3}
]
},
{
id:'y2x4',grade:'二年级',semester:'下册',title:'晓出净慈寺送林子方',author:'杨万里',dynasty:'宋',
fullTitle:'晓出净慈寺送林子方（宋·杨万里）',
poem:['毕竟西湖六月中，风光不与四时同。','接天莲叶无穷碧，映日荷花别样红。'],
authorInfo:'杨万里（1127—1206），字廷秀，号诚斋，吉水（今江西吉水）人，南宋著名诗人。他一生创作了两万多首诗，是中国文学史上存诗最多的诗人之一。杨万里的诗风清新活泼，被称为"诚斋体"。',
explanation:[
{orig:'毕竟西湖六月中，',text:'到底是西湖的六月时节啊。"毕竟"二字带有一种赞叹的语气，点明时间和地点。'},
{orig:'风光不与四时同。',text:'风光与其他季节不同。"不与四时同"为后面的描写做铺垫，引起读者的期待。'},
{orig:'接天莲叶无穷碧，',text:'碧绿的莲叶一望无际，仿佛与天相连。"接天"写出莲叶的广阔，"无穷碧"极言绿色的无边无际。'},

explanation:[

{orig:'一行白鹭上青天。',text:'一行白鹭飞向蔚蓝的天空。"白鹭"与"青天"色彩对比，"上"字写出白鹭飞升的动态美。'},
{orig:'窗含西岭千秋雪，',text:'从窗口望去，西边的山岭上覆盖着千年不化的积雪。"含"字用得精妙，把窗户比作画框，将远山纳入其中。'},

],
background:'这首诗是杜甫在成都草堂时所作。安史之乱后，杜甫在成都浣花溪畔建了草堂，过了一段相对安定的生活。诗人从窗口望去，看到黄鹂、翠柳、白鹭、青天、雪山、船只，构成一幅色彩明丽、生机盎然的画面。',

poem:['月黑见渔灯，孤光一点萤。','微微风簇浪，散作满河星。'],
authorInfo:'查慎行（1650—1727），字悔余，号初白，海宁（今浙江海宁）人，清代诗人。他年轻时多次参加科举不中，直到晚年才中进士。查慎行的诗以描写自然风光见长，风格清新平易。',
explanation:[
{orig:'月黑见渔灯，',text:'在没有月亮的夜晚，看到了一盏渔灯。"月黑"点出夜的黑暗，"渔灯"是黑暗中唯一的光源。'},
{orig:'孤光一点萤。',text:'那盏渔灯的光芒孤独地闪烁，像一点萤火虫的光。"孤光"写出灯光的微弱和孤独，"萤"的比喻既形象又增添了一丝诗意。'},
{orig:'微微风簇浪，',text:'微风吹来，水面泛起层层涟漪。"微微"写风的轻柔，"簇"字写出了风推动水波的动态。'},
{orig:'散作满河星。',text:'灯光映在水面上，随着波浪散开，变成了满河的星光。"散"字是全诗的点睛之笔，把一点灯光化为满河星光，画面由暗转明，由静转动。'}
],
background:'这首诗是查慎行在船上过夜时所作。诗人在黑暗的河面上，看到远处一盏孤零零的渔灯，微风吹过，灯光在水面散开，变成了满河的星光。诗人捕捉到了这个美丽的瞬间，写下了这首充满诗意的小诗。',
extra:['这首诗从"一点萤"到"满河星"的变化是全诗的精华','"风簇浪"的"簇"字用得精妙，写出了微风推水的动态','这首诗体现了诗人善于观察自然、发现美的能力'],
quizzes:[
{type:'choice',q:'"月黑"是什么意思？',options:['月亮很黑','没有月亮','月亮被遮住','天很黑'],answer:1},

{type:'judge',q:'"满河星"是指天上的星星倒映在河里。',answer:false},
{type:'choice',q:'"散作满河星"描写的是什么？',options:['天上的星星','灯光在水面的倒影','河里的鱼','萤火虫'],answer:1},
{type:'choice',q:'这首诗从"一点萤"到"满河星"说明了什么？',options:['灯变亮了','微风吹动水面改变了灯光的倒影','天亮了','渔夫增加了'],answer:1}
]
},

poem:['少小离家老大回，乡音无改鬓毛衰。','儿童相见不相识，笑问客从何处来。'],
authorInfo:'贺知章（约655—约733），字季真，自号四明狂客，越州永兴（今浙江萧山）人，唐代诗人。他三十七岁中进士，在外做官数十年，直到八十六岁才告老还乡。这首诗就是他回到故乡时所作。',
explanation:[
{orig:'少小离家老大回，',text:'年轻时离开家乡，年老了才回来。"少小"与"老大"对比，写出了时间的流逝和人生的沧桑。'},
{orig:'乡音无改鬓毛衰。',text:'口音没有改变，但头发已经花白稀疏了。"乡音无改"说明诗人对故乡的眷恋，"鬓毛衰"写出岁月的无情。'},
{orig:'儿童相见不相识，',text:'家乡的孩子们见到我却不认识。一个"不相识"道出了物是人非的感慨。'},
{orig:'笑问客从何处来。',text:'笑着问我这位客人是从哪里来的。孩子们把我当成了"客"，这一问既天真又令人心酸——诗人明明是家乡人，却被当作了客人。'}
],
background:'贺知章三十七岁离开家乡，在外漂泊近五十年。八十六岁时他终于告老还乡，回到阔别多年的故乡。物是人非，连孩子们都不认识他了。诗人感慨万千，写下了这首动人的诗篇。',
extra:['贺知章回乡时已经八十六岁，是唐代诗人中寿命最长的一位','"笑问客从何处来"是中国文学中最动人的诗句之一','这首诗以儿童的天真反衬老人的沧桑，构思巧妙'],
quizzes:[

authorInfo:'叶绍翁，字嗣宗，号靖逸，龙泉（今浙江龙泉）人，南宋诗人。他的诗以七言绝句见长，风格清新自然。《夜书所见》和《游园不值》是其最著名的作品。',

],

{orig:'千里江陵一日还。',text:'千里之外的江陵一天就到了。"千里"与"一日"的对比，极写船行之快。'},

],
background:'李白因参与永王李璘的幕府，被朝廷流放夜郎（今贵州一带）。在流放途中，他走到白帝城时忽然收到赦免的消息，欣喜若狂，立即乘船东下。这首诗就是在这种狂喜的心情下写成的，因此全诗充满了欢快的基调。',

extra:['这是词牌"忆江南"的经典之作','白居易一共写了三首《忆江南》','"日出江花红胜火，春来江水绿如蓝"是描写江南最著名的对仗之一'],

// ===== 功能逻辑 =====
var TOTAL = POEMS.length;
var learned = {};
try { learned = JSON.parse(localStorage.getItem('poetry_learned') || '{}'); } catch(e) { learned = {}; }

function getLearnedCount() {
  var c = 0;
  for (var k in learned) { if (learned[k]) c++; }
  return c;
}

function updateProgress() {
  var count = getLearnedCount();
  var pct = Math.round(count / TOTAL * 100);
  var pf = document.getElementById('progressFill');
  var pt = document.getElementById('progressText');
  if (pf) pf.style.width = pct + '%';
  if (pt) pt.textContent = count + ' / ' + TOTAL + ' 首';
}

function renderSidebar() {
  var semesters = {};
  var semOrder = [];
  var i, p, key;
  for (i = 0; i < POEMS.length; i++) {
    p = POEMS[i];
    key = p.grade + p.semester;
    if (!semesters[key]) {
      semesters[key] = { grade: p.grade, semester: p.semester, poems: [] };
      semOrder.push(key);
    }
    semesters[key].poems.push(p);
  }
  var sb = document.getElementById('sidebar');
  var row1 = [], row2 = [];
  for (i = 0; i < semOrder.length; i++) {
    var k = semOrder[i];
    var s = semesters[k];
    var label = s.grade.replace('年级','') + s.semester;
    var gid = 'g-' + k;
    var btn = '<a class="grade-nav-item" onclick="doFilter(\'' + gid + '\', this)">' + label + '</a>';
    if (s.grade === '一年级' || s.grade === '二年级' || s.grade === '三年级') row1.push(btn);
    else row2.push(btn);
  }
  sb.innerHTML = '<div class="grade-nav-row">' + row1.join('') + '</div><div class="grade-nav-row">' + row2.join('') + '</div>';
}

var currentFilter = null;

function doFilter(targetGid, el) {
  var allGrades = document.querySelectorAll('.grade-poems');
  var allItems = document.querySelectorAll('.grade-nav-item');
  var i;
  if (currentFilter === targetGid) {
    currentFilter = null;
    for (i = 0; i < allGrades.length; i++) allGrades[i].style.display = '';
    for (i = 0; i < allItems.length; i++) allItems[i].classList.remove('active');
  } else {
    currentFilter = targetGid;
    for (i = 0; i < allGrades.length; i++) {
      allGrades[i].style.display = (allGrades[i].id === targetGid) ? '' : 'none';
    }
    for (i = 0; i < allItems.length; i++) allItems[i].classList.remove('active');
    el.classList.add('active');
    var t = document.getElementById(targetGid);
    if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function scrollToPoem(id) {
  var el = document.getElementById('poem-' + id);
  if (!el) return;
  el.classList.add('open');
  var parent = el.parentElement;
  while (parent && parent.className !== 'grade-poems') parent = parent.parentElement;
  if (parent && parent.style.display === 'none') parent.style.display = '';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function togglePoem(id) {
  var card = document.getElementById('poem-' + id);
  if (card) card.classList.toggle('open');
}

function toggleGrade(gid) {
  var el = document.getElementById(gid);
  if (!el) return;
  el.classList.toggle('collapsed');
  var h = el.querySelector('.grade-header');
  if (h) h.classList.toggle('collapsed');
}

function switchTab(poemId, idx) {
  var card = document.getElementById('poem-' + poemId);
  if (!card) return;
  var tabs = card.querySelectorAll('.poem-tab');
  var panels = card.querySelectorAll('.poem-tab-panel');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].className = 'poem-tab' + (i === idx ? ' active' : '');
  }
  for (var i = 0; i < panels.length; i++) {
    panels[i].className = 'poem-tab-panel' + (i === idx ? ' active' : '');
  }
}

function renderContent() {
  var grades = {};
  var i, p, key;
  for (i = 0; i < POEMS.length; i++) {
    p = POEMS[i];
    key = p.grade + p.semester;
    if (!grades[key]) grades[key] = [];
    grades[key].push(p);
  }
  var main = document.getElementById('mainContent');
  var html = '';
  var keys = [];
  for (var k in grades) keys.push(k);
  for (i = 0; i < keys.length; i++) {
    var gk = keys[i];
    var poems = grades[gk];
    var gid = 'g-' + gk;
    var label = gk.replace('上册', ' · 上册').replace('下册', ' · 下册');
    html += '<div class="grade-poems" id="' + gid + '">';
    html += '<div class="grade-header" onclick="toggleGrade(\'' + gid + '\')"><h2>' + label + '</h2></div>';
    for (var j = 0; j < poems.length; j++) {
      html += buildCard(poems[j]);
    }
    html += '</div>';
  }
  main.innerHTML = html;
}

function buildCard(p) {
  var i, lines = '', expl = '', trans = '', extra = '';
  for (i = 0; i < p.poem.length; i++) lines += '<p>' + p.poem[i] + '</p>';
  for (i = 0; i < p.explanation.length; i++) {
    var e = p.explanation[i];
    expl += '<div class="line-analysis"><div class="original">' + e.orig + '</div><div>' + e.text + '</div></div>';
    trans += '<p><strong>' + e.orig + '</strong><br>' + e.text + '</p>';
  }
  for (i = 0; i < p.extra.length; i++) extra += '<li>' + p.extra[i] + '</li>';

  var qHtml = '';
  var letters = ['A','B','C','D'];
  for (i = 0; i < p.quizzes.length; i++) {
    var q = p.quizzes[i];
    var qid = p.id + '_q' + i;
    var body = '';
    if (q.type === 'choice') {
      body = '<div class="quiz-options">';
      for (var oi = 0; oi < q.options.length; oi++) {
        body += '<div class="quiz-option" data-qid="' + qid + '" data-idx="' + oi + '" onclick="selectOption(this)"><span class="letter">' + letters[oi] + '</span><span>' + q.options[oi] + '</span></div>';
      }
      body += '</div>';
    } else if (q.type === 'fill') {
      body = '<input class="fill-input" id="input-' + qid + '" placeholder="请输入答案" onkeydown="if(event.key===\'Enter\')checkQuiz(\'' + qid + '\')">';
    } else {
      body = '<div class="quiz-options">';
      body += '<div class="quiz-option" data-qid="' + qid + '" data-idx="0" onclick="selectOption(this)"><span class="letter">✓</span><span>正确</span></div>';
      body += '<div class="quiz-option" data-qid="' + qid + '" data-idx="1" onclick="selectOption(this)"><span class="letter">✗</span><span>错误</span></div>';
      body += '</div>';
    }
    var typeLabel = q.type === 'choice' ? '选择题' : q.type === 'fill' ? '填空题' : '判断题';
    var typeCls = q.type === 'choice' ? 'choice' : q.type === 'fill' ? 'fill' : 'judge';
    qHtml += '<div class="quiz-question" id="quiz-' + qid + '">';
    qHtml += '<span class="q-type ' + typeCls + '">' + typeLabel + '</span>';
    qHtml += '<div class="q-text">' + q.q + '</div>' + body;
    qHtml += '<button class="quiz-check-btn" onclick="checkQuiz(\'' + qid + '\')">检查答案</button>';
    qHtml += '<div class="quiz-result" id="result-' + qid + '"></div>';
    qHtml += '</div>';
  }

  var tabNames = ['古诗原文','白话译文','诗句赏析','创作背景','课后测试'];
  var tabBtns = '';
  for (i = 0; i < tabNames.length; i++) {
    tabBtns += '<button class="poem-tab' + (i === 0 ? ' active' : '') + '" onclick="switchTab(\'' + p.id + '\',' + i + ')">' + tabNames[i] + '</button>';
  }

  var bg = learned[p.id] ? '#2d7d2d' : 'var(--accent)';
  var label2 = learned[p.id] ? '✓ 已掌握' : '标记为已掌握';

  var h = '';
  h += '<div class="poem-card" id="poem-' + p.id + '"><div class="poem-card-inner">';
  h += '<div class="poem-title-area" onclick="togglePoem(\'' + p.id + '\')">';
  h += '<div class="poem-title-left"><h3>' + p.title + '</h3><span class="poem-meta">' + p.fullTitle + '</span></div>';
  h += '<span class="poem-title-arrow">▶</span></div>';
  h += '<div class="poem-body">';
  h += '<div class="poem-tabs">' + tabBtns + '</div>';
  h += '<div class="poem-tab-content">';
  h += '<div class="poem-tab-panel active" data-panel="' + p.id + '-0"><div class="poem-text">' + lines + '</div><div class="author-info">' + p.authorInfo + '</div></div>';
  h += '<div class="poem-tab-panel" data-panel="' + p.id + '-1"><div class="translation-text">' + trans + '</div></div>';
  h += '<div class="poem-tab-panel" data-panel="' + p.id + '-2"><div class="explanation">' + expl + '</div></div>';
  h += '<div class="poem-tab-panel" data-panel="' + p.id + '-3"><div class="background-info">' + p.background + '</div><div class="extra-knowledge"><ul>' + extra + '</ul></div></div>';
  h += '<div class="poem-tab-panel" data-panel="' + p.id + '-4"><div class="quiz-area"><div class="quiz-title">随堂小测</div>' + qHtml + '</div></div>';
  h += '</div>';
  h += '<div style="text-align:center;padding:0;">';
  h += '<button onclick="event.stopPropagation();markLearned(\'' + p.id + '\')" id="btn-' + p.id + '" style="padding:8px 28px;background:' + bg + ';color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:13px;cursor:pointer;">' + label2 + '</button>';
  h += '</div></div></div>';
  return h;
}

function markLearned(id) {
  learned[id] = !learned[id];
  try { localStorage.setItem('poetry_learned', JSON.stringify(learned)); } catch(e) {}
  var btn = document.getElementById('btn-' + id);
  if (btn) {
    btn.textContent = learned[id] ? '✓ 已掌握' : '标记为已掌握';
    btn.style.background = learned[id] ? '#2d7d2d' : 'var(--accent)';
  }
  updateProgress();
}

function selectOption(el) {
  var qid = el.getAttribute('data-qid');
  var opts = document.querySelectorAll('[data-qid="' + qid + '"]');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  el.classList.add('selected');
}

function checkQuiz(qid) {
  var quiz = findQuiz(qid);
  if (!quiz) return;
  var resultEl = document.getElementById('result-' + qid);
  var qEl = document.getElementById('quiz-' + qid);
  if (!resultEl || !qEl) return;
  if (quiz.type === 'fill') {
    var input = document.getElementById('input-' + qid);
    var val = input.value.trim();
    if (!val) { resultEl.className='quiz-result show fail'; resultEl.textContent='请输入答案'; return; }
    if (val === quiz.answer) {
      input.className = 'fill-input correct';
      resultEl.className='quiz-result show pass'; resultEl.textContent='✓ 正确！';
    } else {
      input.className = 'fill-input wrong';
      resultEl.className='quiz-result show fail'; resultEl.textContent='✗ 正确答案是：'+quiz.answer;
    }
  } else {
    var selected = qEl.querySelector('.quiz-option.selected');
    if (!selected) { resultEl.className='quiz-result show fail'; resultEl.textContent='请先选择答案'; return; }
    var idx = parseInt(selected.getAttribute('data-idx'));
    var correctIdx = quiz.type==='judge' ? (quiz.answer?0:1) : quiz.answer;
    var opts = qEl.querySelectorAll('.quiz-option');
    for (var i = 0; i < opts.length; i++) {
      var oi = parseInt(opts[i].getAttribute('data-idx'));
      if (oi===correctIdx) opts[i].classList.add('correct');
      else if (opts[i].classList.contains('selected') && oi!==correctIdx) opts[i].classList.add('wrong');
    }
    if (idx===correctIdx) {
      resultEl.className='quiz-result show pass'; resultEl.textContent='✓ 正确！';
    } else {
      resultEl.className='quiz-result show fail';
      resultEl.textContent='✗ 正确答案是：'+(quiz.type==='judge'?(quiz.answer?'正确':'错误'):quiz.options[correctIdx]);
    }
  }
}

function findQuiz(qid) {
  var parts = qid.split('_q');
  for (var i = 0; i < POEMS.length; i++) {
    if (POEMS[i].id === parts[0]) return POEMS[i].quizzes[parseInt(parts[1])];
  }
  return null;
}

window.addEventListener('scroll', function() {
  var bt = document.getElementById('backTop');
  if (bt) bt.classList.toggle('show', window.scrollY > 400);
});

// 初始化
try {
  renderSidebar();
  renderContent();
  updateProgress();
} catch(e) {
  document.getElementById('mainContent').innerHTML = '<div style="padding:40px;color:red;font-size:18px;"><b>JS 运行错误:</b><br><br>' + e.message + '<br><br><small>' + (e.stack || '').split('\n').slice(0,3).join('<br>') + '</small></div>';
}
</script>
